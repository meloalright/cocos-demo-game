name: Build Cocos2d-x Demo

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ \
            libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libglew-dev libglfw3-dev \
            libgtk-3-dev \
            libfontconfig1-dev libfreetype-dev \
            libopenal-dev libsqlite3-dev \
            libcurl4-openssl-dev libzip-dev \
            libpng-dev libjpeg-dev libwebp-dev \
            libxxf86vm-dev \
            python3

      - name: Clone Cocos2d-x
        run: |
          git clone --depth 1 --branch v4 https://github.com/cocos2d/cocos2d-x.git cocos2d
          cd cocos2d
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          python3 download-deps.py --remove-download yes
          git submodule update --init --depth 1

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCOCOS2DX_ROOT_PATH=${{ github.workspace }}/cocos2d
          cmake --build . --config Release --parallel $(nproc)

      - name: Package
        run: |
          mkdir -p package
          cp build/cocos-demo-game package/ 2>/dev/null || true
          cp -r Resources package/
          tar czf cocos-demo-game-linux-x64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocos-demo-game-linux-x64
          path: cocos-demo-game-linux-x64.tar.gz

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake glew
          pip3 install --break-system-packages setuptools

      - name: Clone Cocos2d-x
        run: |
          git clone --depth 1 --branch v4 https://github.com/cocos2d/cocos2d-x.git cocos2d
          cd cocos2d
          git config --global url."https://github.com/".insteadOf "git://github.com/"
          python3 download-deps.py --remove-download yes
          git submodule update --init --depth 1

      - name: Patch Cocos2d-x for modern Xcode
        run: |
          cd cocos2d
          python3 -c "
          import re

          # 1. Xcode 15+ changed iconv_t from void* to __tag_iconv_t*
          with open('cocos/2d/CCFontAtlas.cpp', 'r') as f:
              s = f.read()
          s = s.replace('iconv_close(_iconv)', 'iconv_close((iconv_t)_iconv)')
          s = s.replace('iconv(_iconv, (char**)&pin', 'iconv((iconv_t)_iconv, &pin')
          with open('cocos/2d/CCFontAtlas.cpp', 'w') as f:
              f.write(s)
          print('Patched CCFontAtlas.cpp for iconv_t')

          # 2. AudioCache.h missing <functional> for std::function
          with open('cocos/audio/apple/AudioCache.h', 'r') as f:
              s = f.read()
          if '#include <functional>' not in s:
              s = s.replace('#include <string>', '#include <string>\n#include <functional>', 1)
              if '#include <functional>' not in s:
                  s = re.sub(r'(#pragma once|#ifndef .*\n#define .*)', r'\1\n#include <functional>', s, count=1)
              with open('cocos/audio/apple/AudioCache.h', 'w') as f:
                  f.write(s)
              print('Patched AudioCache.h: added #include <functional>')
          "

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DCOCOS2DX_ROOT_PATH=${{ github.workspace }}/cocos2d \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON
          cmake --build . --config Release --parallel $(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p package
          cp build/cocos-demo-game package/ 2>/dev/null || true
          cp -r Resources package/
          tar czf cocos-demo-game-macos-arm64.tar.gz -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocos-demo-game-macos-arm64
          path: cocos-demo-game-macos-arm64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cocos-demo-game-linux-x64/cocos-demo-game-linux-x64.tar.gz
            cocos-demo-game-macos-arm64/cocos-demo-game-macos-arm64.tar.gz
          generate_release_notes: true
